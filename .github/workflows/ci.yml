name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app || sudo xcode-select -s "$(ls -d /Applications/Xcode_16*.app | sort | tail -1)"

      - name: Xcode version
        run: xcodebuild -version

      # Defensive: lets SwiftPM use its cloned bare repos if the runner ever sets
      # safe.bareRepository=explicit.
      - name: Allow SwiftPM bare repositories
        run: git config --global safe.bareRepository all

      - name: Build (no code signing)
        run: |
          set -o pipefail
          xcodebuild build \
            -project ECEUH.xcodeproj \
            -scheme ECEUH \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO
